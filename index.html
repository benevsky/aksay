/* reset */
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Onest',sans-serif;background:#F5EFE6;color:#1A0A00;overflow-x:hidden}
body.dk{background:#0D0500;color:#F5EFE6}
::selection{background:#C8251A;color:#fff}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:rgba(200,37,26,.4);border-radius:2px}

/* tokens */
:root{
  --cr:#F5EFE6;--dk:#0D0500;
  --card:#FBF7F2;--coal:#1A0A00;
  --red:#C8251A;--org:#E8391A;
  --b:rgba(26,10,0,.08);--b2:rgba(26,10,0,.05);
  --t2:rgba(26,10,0,.55);--t3:rgba(26,10,0,.34)
}
body.dk{
  --card:#1A0900;--b:rgba(245,239,230,.07);
  --b2:rgba(245,239,230,.04);--t2:rgba(245,239,230,.55);--t3:rgba(245,239,230,.32)
}

/* animations */
@keyframes mq{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes mqr{0%{transform:translateX(-50%)}100%{transform:translateX(0)}}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.rv{opacity:0;transform:translateY(18px);transition:opacity .7s cubic-bezier(.16,1,.3,1),transform .7s cubic-bezier(.16,1,.3,1)}
.rv.vis{opacity:1;transform:none}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;z-index:1000;transition:all .3s}
.nav.sc{background:rgba(245,239,230,.93);backdrop-filter:blur(20px);border-bottom:1px solid var(--b)}
body.dk .nav.sc{background:rgba(13,5,0,.93)}
.ni{max-width:1380px;margin:0 auto;padding:0 28px;height:66px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.nlinks{display:flex;gap:2px;align-items:center;flex:1;justify-content:center}
.nl{background:none;border:none;cursor:pointer;padding:7px 11px;border-radius:20px;font-size:.8rem;font-weight:500;font-family:'Onest',sans-serif;color:#1A0A00;opacity:.6;transition:all .2s;white-space:nowrap}
body.dk .nl{color:#F5EFE6}
.nl:hover,.nl.on{opacity:1;color:#C8251A}
.lbar{display:flex;gap:2px;background:rgba(26,10,0,.06);border-radius:20px;padding:3px}
body.dk .lbar{background:rgba(245,239,230,.07)}
.lb{background:none;border:none;cursor:pointer;padding:4px 9px;border-radius:16px;font-size:.67rem;font-weight:800;font-family:'Onest',sans-serif;letter-spacing:.07em;text-transform:uppercase;color:#1A0A00;transition:all .2s}
body.dk .lb{color:#F5EFE6}
.lb.on{background:#C8251A;color:#fff}
.ib{background:rgba(26,10,0,.06);border:none;cursor:pointer;width:35px;height:35px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#1A0A00;transition:all .2s;flex-shrink:0}
body.dk .ib{background:rgba(245,239,230,.07);color:#F5EFE6}
.mob-menu-wrap{display:none;position:fixed;top:66px;left:0;right:0;background:var(--cr);border-bottom:1px solid var(--b);padding:14px 20px 18px;flex-direction:column;gap:4px;z-index:999}
body.dk .mob-menu-wrap{background:#0D0500}
.mob-menu-wrap.op{display:flex}
.mnl{background:none;border:none;cursor:pointer;padding:10px 13px;border-radius:11px;font-size:.92rem;font-family:'Onest',sans-serif;color:#1A0A00;text-align:left;font-weight:500;transition:all .2s}
body.dk .mnl{color:#F5EFE6}
.mnl:hover{background:rgba(200,37,26,.08);color:#C8251A}
@media(max-width:900px){.nlinks{display:none!important}}
@media(min-width:901px){.mob-tog{display:none!important}}

/* layout */
.w{max-width:1380px;margin:0 auto;padding:0 28px}
@media(max-width:640px){.w{padding:0 16px}}
.sec{padding:104px 0}
@media(max-width:768px){.sec{padding:60px 0}}

/* section heading */
.sh{margin-bottom:52px}
.shl{display:block;font-size:.66rem;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:#C8251A;margin-bottom:12px}
.sht{font-family:'Playfair Display',serif;font-weight:900;letter-spacing:-.04em;line-height:.95;font-size:clamp(2rem,3.6vw,3.6rem);color:#1A0A00}
body.dk .sht{color:#F5EFE6}
.sht .em{color:#E8391A}
.shs{color:var(--t2);font-size:.96rem;line-height:1.72;margin-top:15px;max-width:600px}
.sdk .shl{color:rgba(232,57,26,.72)}
.sdk .sht{color:#F5EFE6}
.sdk .shs{color:rgba(245,239,230,.48)}

/* typography */
.dp{font-family:'Playfair Display',serif;font-weight:900;letter-spacing:-.04em;line-height:.93}
.sf{font-family:'Playfair Display',serif;font-weight:700;letter-spacing:-.025em}
.num{font-family:'Playfair Display',serif;font-weight:900;letter-spacing:-.05em;line-height:1}

/* buttons */
.btn{display:inline-flex;align-items:center;gap:7px;cursor:pointer;border:none;border-radius:50px;font-family:'Onest',sans-serif;font-weight:700;font-size:.84rem;transition:all .22s;white-space:nowrap;text-decoration:none}
.br{background:#C8251A;color:#fff;padding:12px 26px}
.br:hover{background:#A81E14;transform:translateY(-1px)}
.bo{background:#E8391A;color:#fff;padding:12px 26px}
.bo:hover{background:#C82D12;transform:translateY(-1px)}
.bg{background:transparent;border:1.5px solid var(--b);color:#1A0A00;padding:11px 24px}
body.dk .bg{border-color:rgba(245,239,230,.16);color:#F5EFE6}
.bg:hover{border-color:#E8391A;color:#E8391A}
.bgw{background:transparent;border:1.5px solid rgba(245,239,230,.25);color:#F5EFE6;padding:11px 24px}
.bgw:hover{border-color:#F5EFE6}

/* cards */
.cd{background:var(--card);border-radius:18px;border:1px solid var(--b);transition:transform .28s,box-shadow .28s}
.cd:hover{transform:translateY(-4px);box-shadow:0 12px 36px rgba(26,10,0,.08)}
body.dk .cd:hover{box-shadow:0 12px 36px rgba(0,0,0,.25)}

/* bento */
.bn{display:grid;grid-template-columns:repeat(12,1fr);gap:11px}
.g3{grid-column:span 3}.g4{grid-column:span 4}.g5{grid-column:span 5}
.g6{grid-column:span 6}.g7{grid-column:span 7}.g8{grid-column:span 8}
@media(max-width:1100px){
  .g3{grid-column:span 4!important}.g4{grid-column:span 6!important}
  .g5{grid-column:span 6!important}.g7{grid-column:span 8!important}
  .g8{grid-column:span 12!important}
}
@media(max-width:640px){
  .bn{grid-template-columns:1fr 1fr!important;gap:8px!important}
  .g3,.g4,.g5,.g6,.g7,.g8{grid-column:span 2!important}
}

/* bento cards */
.bc{border-radius:22px;overflow:hidden;position:relative;transition:transform .32s cubic-bezier(.16,1,.3,1),box-shadow .32s}
.bc:hover{transform:translateY(-3px) scale(1.005);box-shadow:0 16px 48px rgba(26,10,0,.11)}
.bm{border-radius:22px;padding:26px;display:flex;flex-direction:column;justify-content:space-between;min-height:192px;position:relative;overflow:hidden;transition:transform .32s cubic-bezier(.16,1,.3,1),box-shadow .32s}
.bm:hover{transform:translateY(-3px) scale(1.005);box-shadow:0 16px 48px rgba(26,10,0,.11)}

/* stores */
.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:13px}
@media(max-width:640px){.sg{grid-template-columns:1fr}}

/* products */
.pg{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:12px}
@media(max-width:640px){.pg{grid-template-columns:repeat(2,1fr)}}
.pc{background:var(--card);border-radius:17px;border:1px solid var(--b);overflow:hidden;cursor:pointer;transition:transform .28s,box-shadow .28s}
.pc:hover{transform:translateY(-5px);box-shadow:0 12px 36px rgba(26,10,0,.08)}

/* category tabs */
.ct{background:none;border:1.5px solid var(--b);cursor:pointer;padding:8px 17px;border-radius:50px;font-size:.8rem;font-weight:600;font-family:'Onest',sans-serif;color:#1A0A00;transition:all .2s;white-space:nowrap}
body.dk .ct{color:#F5EFE6;border-color:rgba(245,239,230,.1)}
.ct:hover,.ct.on{background:#C8251A;color:#fff;border-color:#C8251A}

/* process 3x2 */
.pf3{display:grid;grid-template-columns:repeat(3,1fr);gap:13px}
@media(max-width:900px){.pf3{grid-template-columns:repeat(2,1fr)}}
@media(max-width:540px){.pf3{grid-template-columns:1fr}}
.pf-row{display:flex;align-items:center;gap:0;margin-bottom:44px;overflow-x:auto;padding-bottom:4px}
.pf-node{width:32px;height:32px;border-radius:50%;border:2px solid #C8251A;display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:800;color:#C8251A;flex-shrink:0;font-family:'Onest',sans-serif;background:var(--cr)}
body.dk .pf-node{background:var(--dk)}
.pf-line{flex:1;height:2px;background:linear-gradient(90deg,#C8251A,#E8391A);min-width:14px}

/* history cards */
.hc-grid{display:flex;flex-direction:column;gap:12px;max-width:800px}
.hc{background:var(--card);border-radius:17px;border:1px solid var(--b);overflow:hidden;display:flex;align-items:stretch;transition:transform .28s,box-shadow .28s}
.hc:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(26,10,0,.07)}
body.dk .hc{background:#1C0A00}
.hc-year{font-family:'Playfair Display',serif;font-weight:900;font-size:1.4rem;color:#C8251A;line-height:1;flex-shrink:0;width:64px;margin-bottom:8px}

/* b2b adv 2x2 */
.adv4{display:grid;grid-template-columns:1fr 1fr;gap:13px}
@media(max-width:640px){.adv4{grid-template-columns:1fr}}

/* marquee */
.mqw{overflow:hidden;width:100%}
.mqf{animation:mq 34s linear infinite;display:flex;gap:0;white-space:nowrap;align-items:center}
.mqb{animation:mqr 40s linear infinite;display:flex;gap:0;white-space:nowrap;align-items:center}

/* footer */
.ft{background:#100600;padding:72px 0 30px}
body.dk .ft{background:#080300}
.ftg{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr;gap:40px;margin-bottom:52px}
@media(max-width:1024px){.ftg{grid-template-columns:1fr 1fr 1fr;gap:26px}}
@media(max-width:560px){.ftg{grid-template-columns:1fr 1fr;gap:18px}}
.ftl{display:block;color:rgba(245,239,230,.36);font-size:.8rem;margin-bottom:10px;cursor:pointer;transition:color .2s}
.ftl:hover{color:#E8391A}

/* tags */
.tg{display:inline-flex;align-items:center;background:rgba(200,37,26,.1);color:#C8251A;font-size:.62rem;font-weight:800;padding:4px 10px;border-radius:14px;font-family:'Onest',sans-serif;letter-spacing:.06em;text-transform:uppercase}
.tglt{background:rgba(245,239,230,.14);color:rgba(245,239,230,.65)}
.tggr{background:rgba(34,197,94,.1);color:#16a34a}

/* form */
input,textarea,select{width:100%;padding:11px 14px;border-radius:11px;border:1.5px solid var(--b);background:rgba(26,10,0,.025);color:#1A0A00;font-family:'Onest',sans-serif;font-size:.86rem;outline:none;transition:border .2s}
body.dk input,body.dk textarea,body.dk select{background:rgba(245,239,230,.04);color:#F5EFE6;border-color:rgba(245,239,230,.1)}
input:focus,textarea:focus{border-color:#E8391A}
.fl{display:block;font-size:.68rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--t3);margin-bottom:5px}

/* vacancy */
.vc{background:var(--card);border-radius:17px;border:1px solid var(--b);padding:22px 24px;transition:transform .25s,box-shadow .25s}
.vc:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(26,10,0,.07)}

/* page transition */
.page-wrap{animation:fadeUp .35s cubic-bezier(.16,1,.3,1) both}

/* grain */
.grain-ov::after{content:'';position:absolute;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.04'/%3E%3C/svg%3E");pointer-events:none;z-index:0}

.pulse{animation:pulse 2.2s ease infinite}

/* info boxes on sub-pages */
.info-box{background:var(--card);border-radius:18px;border:1px solid var(--b);padding:28px 24px}
.info-row{display:grid;grid-template-columns:1fr 1fr;gap:13px}
@media(max-width:640px){.info-row{grid-template-columns:1fr}}
.info-row3{display:grid;grid-template-columns:repeat(3,1fr);gap:13px}
@media(max-width:900px){.info-row3{grid-template-columns:1fr 1fr}}
@media(max-width:540px){.info-row3{grid-template-columns:1fr}}

/* stat cards 4 col */
.stat4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:48px}
@media(max-width:900px){.stat4{grid-template-columns:repeat(2,1fr)}}
@media(max-width:480px){.stat4{grid-template-columns:1fr 1fr}}
</style>
</head>

} dangerouslySetInnerHTML={{__html:`<svg width="${size}" height="${size*1.4}" viewBox="0 0 60 84" fill="none"><line x1="30" y1="82" x2="30" y2="8" stroke="${color}" stroke-width="2" stroke-linecap="round"/><ellipse cx="30" cy="20" rx="8" ry="12" fill="${color}" opacity=".92"/><ellipse cx="20" cy="35" rx="7" ry="11" fill="${color}" opacity=".72" transform="rotate(-22 20 35)"/><ellipse cx="40" cy="35" rx="7" ry="11" fill="${color}" opacity=".72" transform="rotate(22 40 35)"/><ellipse cx="18" cy="51" rx="6" ry="10" fill="${color}" opacity=".52" transform="rotate(-28 18 51)"/><ellipse cx="42" cy="51" rx="6" ry="10" fill="${color}" opacity=".52" transform="rotate(28 42 51)"/><line x1="28" y1="74" x2="20" y2="82" stroke="${color}" stroke-width="1.6" stroke-linecap="round"/></svg>`}}/>;

/* ═══════ REVEAL HOOK ═══════ */
function useRv(){
  const ref=useRef(null);
  const[v,setV]=useState(false);
  useEffect(()=>{
    if(!ref.current)return;
    const o=new IntersectionObserver(([e])=>{if(e.isIntersecting){setV(true);o.disconnect();}},{threshold:.06});
    o.observe(ref.current);
    return()=>o.disconnect();
  },[]);
  return[ref,v];
}
function Rv({children,d=0,style={}}){
  const[ref,v]=useRv();
  return <div ref={ref} className={`rv${v?' vis':''}`} style={{transitionDelay:`${d}s`,...style}}>{children}</div>;
}

/* ═══════ FOOTER ═══════ */
function Footer({setPage,lang,setLang,dark,setDark}){
  const t=LANGS[lang].footer;
  const co=dark?"#F5EFE6":"#1A0A00";
  const pageMap={0:"stores",1:"products",2:"about",3:"prod",4:"partners",5:"careers"};

  return(
    <footer className="ft">
      <div className="w">
        <div className="ftg">
          <div>
            <div style={{display:"flex",alignItems:"center",gap:9,marginBottom:15}}>
              <AksayLogo s={32}/>
              <div>
                <div style={{fontFamily:"'Playfair Display',serif",fontWeight:800,fontSize:".95rem",color:"#F5EFE6",letterSpacing:"-.02em"}}>ХБК Аксай</div>
                <div style={{fontSize:".52rem",fontWeight:700,letterSpacing:".1em",textTransform:"uppercase",color:"rgba(245,239,230,.26)",marginTop:1}}>с 1988 года</div>
              </div>
            </div>
            <p style={{color:"rgba(245,239,230,.32)",fontSize:".8rem",lineHeight:1.62,marginBottom:20,maxWidth:240}}>{t.tag}</p>
            {[{i:"pin",v:t.addr},{i:"phone",v:t.phone},{i:"mail",v:t.email}].map((c,i)=>(
              <div key={i} style={{display:"flex",gap:8,alignItems:"flex-start",marginBottom:8}}>
                <span style={{marginTop:1,opacity:.36}}><Ico n={c.i} s={12} c="rgba(245,239,230,.55)"/></span>
                <span style={{color:"rgba(245,239,230,.35)",fontSize:".78rem",lineHeight:1.45}}>{c.v}</span>
              </div>
            ))}
          </div>
          {t.cols.map(({t:title,l:links},ci)=>(
            <div key={ci}>
              <div style={{color:"rgba(245,239,230,.2)",fontSize:".63rem",fontWeight:800,letterSpacing:".1em",textTransform:"uppercase",marginBottom:13}}>{title}</div>
              {links.map((link,li)=>(
                <a key={li} className="ftl" onClick={()=>{setPage(pageMap[ci]||"home");window.scrollTo({top:0});}}>{link}</a>
              ))}
            </div>
          ))}
        </div>
        <div style={{borderTop:"1px solid rgba(245,239,230,.06)",paddingTop:22,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:13}}>
          <div style={{color:"rgba(245,239,230,.2)",fontSize:".73rem"}}>{t.copy}</div>
          <div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
            <div className="lbar" style={{background:"rgba(245,239,230,.06)"}}>
              {["RU","KK","EN","ZH"].map(l=>(
                <button key={l} className={`lb${lang===l?" on":""}`} onClick={()=>setLang(l)} style={{color:lang===l?"#fff":"rgba(245,239,230,.36)"}}>{l}</button>
              ))}
            </div>
            <button className="ib" style={{background:"rgba(245,239,230,.06)"}} onClick={()=>setDark(d=>!d)}>
              {dark?<Ico n="sun" s={13} c="rgba(245,239,230,.55)"/>:<Ico n="moon" s={13} c="rgba(245,239,230,.55)"/>}
            </button>
            <div style={{display:"flex",gap:16}}>
              {[t.priv,t.terms].map((l,i)=>(
                <span key={i} style={{color:"rgba(245,239,230,.18)",fontSize:".72rem",cursor:"pointer"}}
                  onMouseEnter={e=>e.currentTarget.style.color="rgba(232,57,26,.65)"}
                  onMouseLeave={e=>e.currentTarget.style.color="rgba(245,239,230,.18)"}>{l}</span>
              ))}
            </div>
          </div>
        </div>
      </div>
    </footer>
  );
}

/* ═══════ MAIN APP ═══════ */
function App(){
  const[lang,setLang]=useState("RU");
  const[dark,setDark]=useState(false);
  const[page,setPage]=useState("home");

  useEffect(()=>{document.body.className=dark?"dk":"";},[dark]);

  const sharedProps={setPage,lang,dark};

  const landing=(
    <div className="page-wrap">
      <Hero {...sharedProps}/>
      <Stores preview={true} {...sharedProps}/>
      <Products preview={true} {...sharedProps}/>
      <Trust lang={lang} dark={dark}/>
      <History preview={true} {...sharedProps}/>
      <Production preview={true} {...sharedProps}/>
      <Careers preview={true} {...sharedProps}/>
      <B2B preview={true} {...sharedProps}/>
      <NewsPreview setPage={setPage} lang={lang} dark={dark}/>
      <Contacts lang={lang} dark={dark}/>
    </div>
  );

  const subPage=(content)=>(
    <div className="page-wrap" style={{paddingTop:68}}>{content}</div>
  );

  const pages={
    home: landing,
    about: subPage(<AboutPage lang={lang} dark={dark}/>),
    prod: subPage(<ProductionPage lang={lang} dark={dark}/>),
    products: subPage(<Products preview={false} {...sharedProps}/>),
    stores: subPage(<StoresPage lang={lang} dark={dark}/>),
    partners: subPage(<PartnersPage lang={lang} dark={dark}/>),
    careers: subPage(<CareersPage lang={lang} dark={dark}/>),
    news: subPage(<NewsPage lang={lang} dark={dark}/>),
    media: subPage(<MediaPage lang={lang} dark={dark}/>),
  };

  return(
    <>
      <NavBar page={page} setPage={setPage} lang={lang} setLang={setLang} dark={dark} setDark={setDark}/>
      {pages[page]||pages.home}
      <Footer setPage={setPage} lang={lang} setLang={setLang} dark={dark} setDark={setDark}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
