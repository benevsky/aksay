<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ХБК Аксай — Хлебобулочный комбинат с 1988 года</title>
<style>@font-face{font-family:"Gilroy";font-weight:400;font-style:normal;src:url("https://cdn.jsdelivr.net/gh/nicholasgasior/gilroy-free-font@main/web/Gilroy-Regular.woff2") format("woff2")}@font-face{font-family:"Gilroy";font-weight:600;font-style:normal;src:url("https://cdn.jsdelivr.net/gh/nicholasgasior/gilroy-free-font@main/web/Gilroy-SemiBold.woff2") format("woff2")}@font-face{font-family:"Gilroy";font-weight:700;font-style:normal;src:url("https://cdn.jsdelivr.net/gh/nicholasgasior/gilroy-free-font@main/web/Gilroy-Bold.woff2") format("woff2")}</style>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
/* reset */
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Gilroy',sans-serif;background:#F5EFE6;color:var(--coal,#1A0A00);overflow-x:hidden}
body.dk{background:#050505;color:#F5EFE6}
body.dk *{--t2:rgba(245,239,230,.55);--t3:rgba(245,239,230,.34);--coal:#F5EFE6}
::selection{background:#C8251A;color:#fff}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:rgba(200,37,26,.4);border-radius:2px}
img{image-rendering:auto;-webkit-image-rendering:auto}
@media(max-width:640px){.hide-mob{display:none!important}}

/* tokens */
:root{
  --cr:#F5EFE6;--dk:#050505;
  --card:#FBF7F2;--coal:#1A0A00;
  --red:#C8251A;--org:#E8391A;
  --b:rgba(26,10,0,.08);--b2:rgba(26,10,0,.05);
  --t2:rgba(26,10,0,.55);--t3:rgba(26,10,0,.34)
}
body.dk{
  --card:#111;--b:rgba(245,239,230,.07);--coal:#F5EFE6;
  --b2:rgba(245,239,230,.04);--t2:rgba(245,239,230,.55);--t3:rgba(245,239,230,.32)
}

/* animations */
@keyframes mq{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes mqr{0%{transform:translateX(-50%)}100%{transform:translateX(0)}}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.rv{opacity:0;transform:translateY(18px);transition:opacity .7s cubic-bezier(.16,1,.3,1),transform .7s cubic-bezier(.16,1,.3,1)}
.rv.vis{opacity:1;transform:none}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;z-index:1000;transition:all .3s}
.nav.sc{background:rgba(245,239,230,.93);backdrop-filter:blur(20px);border-bottom:1px solid var(--b)}
body.dk .nav.sc{background:rgba(5,5,5,.95)}
.ni{max-width:1380px;margin:0 auto;padding:0 28px;height:66px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.nlinks{display:flex;gap:2px;align-items:center;flex:1;justify-content:center}
.nl{background:none;border:none;cursor:pointer;padding:7px 11px;border-radius:20px;font-size:.8rem;font-weight:500;font-family:'Gilroy',sans-serif;color:var(--coal,#1A0A00);opacity:.6;transition:all .2s;white-space:nowrap}
body.dk .nl{color:#F5EFE6}
.nl:hover,.nl.on{opacity:1;color:#C8251A}
.lbar{display:flex;gap:2px;background:rgba(26,10,0,.06);border-radius:20px;padding:3px}
body.dk .lbar{background:rgba(245,239,230,.07)}
.lb{background:none;border:none;cursor:pointer;padding:4px 9px;border-radius:16px;font-size:.67rem;font-weight:800;font-family:'Gilroy',sans-serif;letter-spacing:.07em;text-transform:uppercase;color:var(--coal,#1A0A00);transition:all .2s}
body.dk .lb{color:#F5EFE6}
.lb.on{background:#C8251A;color:#fff}
.ib{background:rgba(26,10,0,.06);border:none;cursor:pointer;width:35px;height:35px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--coal,#1A0A00);transition:all .2s;flex-shrink:0}
body.dk .ib{background:rgba(245,239,230,.07);color:#F5EFE6}
.mob-menu-wrap{display:none;position:fixed;top:66px;left:0;right:0;background:var(--cr);border-bottom:1px solid var(--b);padding:14px 20px 18px;flex-direction:column;gap:4px;z-index:999}
body.dk .mob-menu-wrap{background:#050505}
.mob-menu-wrap.op{display:flex}
.mnl{background:none;border:none;cursor:pointer;padding:10px 13px;border-radius:11px;font-size:.92rem;font-family:'Gilroy',sans-serif;color:var(--coal,#1A0A00);text-align:left;font-weight:500;transition:all .2s}
body.dk .mnl{color:#F5EFE6}
.mnl:hover{background:rgba(200,37,26,.08);color:#C8251A}
@media(max-width:900px){.nlinks{display:none!important}}
@media(min-width:901px){.mob-tog{display:none!important}}

/* layout */
.w{max-width:1380px;margin:0 auto;padding:0 28px}
@media(max-width:640px){.w{padding:0 16px}}
.sec{padding:104px 0}
@media(max-width:768px){.sec{padding:60px 0}}

/* section heading */
.sh{margin-bottom:52px}
.shl{display:block;font-size:.66rem;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:#C8251A;margin-bottom:12px}
.sht{font-family:'Gilroy',sans-serif;font-weight:900;letter-spacing:-.04em;line-height:.95;font-size:clamp(2rem,3.6vw,3.6rem);color:var(--coal,#1A0A00)}
body.dk .sht{color:#F5EFE6!important}
body.dk .num{color:#F5EFE6}
body.dk .dp{color:#F5EFE6}
body.dk h2,body.dk h3{color:#F5EFE6}
body.dk .sh *{color:#F5EFE6}
body.dk .sh .shl{color:#C8251A}
body.dk .sh .em{color:#E8391A}
body.dk .sh .shs{color:rgba(245,239,230,.55)!important}
.sht .em{color:#E8391A}
.shs{color:var(--t2);font-size:.96rem;line-height:1.72;margin-top:15px;max-width:600px}
.sdk .shl{color:rgba(232,57,26,.72)}
.sdk .sht{color:#F5EFE6}
.sdk .shs{color:rgba(245,239,230,.48)}

/* typography */
.dp{font-family:'Gilroy',sans-serif;font-weight:900;letter-spacing:-.04em;line-height:.93}
.sf{font-family:'Gilroy',sans-serif;font-weight:700;letter-spacing:-.025em}
.num{font-family:'Gilroy',sans-serif;font-weight:900;letter-spacing:-.05em;line-height:1}

/* buttons */
.btn{display:inline-flex;align-items:center;gap:7px;cursor:pointer;border:none;border-radius:50px;font-family:'Gilroy',sans-serif;font-weight:700;font-size:.84rem;transition:all .22s;white-space:nowrap;text-decoration:none}
.br{background:#C8251A;color:#fff;padding:12px 26px}
.br:hover{background:#A81E14;transform:translateY(-1px)}
.bo{background:#E8391A;color:#fff;padding:12px 26px}
.bo:hover{background:#C82D12;transform:translateY(-1px)}
.bg{background:transparent;border:1.5px solid var(--b);color:var(--coal,#1A0A00);padding:11px 24px}
body.dk .bg{border-color:rgba(245,239,230,.16);color:#F5EFE6}
.bg:hover{border-color:#E8391A;color:#E8391A}
.bgw{background:transparent;border:1.5px solid rgba(245,239,230,.25);color:#F5EFE6;padding:11px 24px}
.bgw:hover{border-color:#F5EFE6}

/* cards */
.cd{background:var(--card);border-radius:18px;border:1px solid var(--b);transition:transform .28s,box-shadow .28s}
.cd:hover{transform:translateY(-4px);box-shadow:0 12px 36px rgba(26,10,0,.08)}
body.dk .cd:hover{box-shadow:0 12px 36px rgba(0,0,0,.25)}

/* bento */
.bn{display:grid;grid-template-columns:repeat(12,1fr);grid-template-rows:1fr 1fr;gap:11px}
.g3{grid-column:span 3}.g4{grid-column:span 4;display:flex;flex-direction:column}.g5{grid-column:span 5;display:flex;flex-direction:column}
.g6{grid-column:span 6}.g7{grid-column:span 7;display:flex;flex-direction:column}.g8{grid-column:span 8}
@media(max-width:1100px){
  .g3{grid-column:span 4!important}.g4{grid-column:span 6!important}
  .g5{grid-column:span 6!important}.g7{grid-column:span 8!important}
  .g8{grid-column:span 12!important}
}
@media(max-width:640px){
  .bn{grid-template-columns:1fr 1fr!important;gap:8px!important}
  .g3,.g4,.g5,.g6,.g7,.g8{grid-column:span 2!important}
}

/* bento cards */
.bc{border-radius:22px;overflow:hidden;position:relative;transition:transform .32s cubic-bezier(.16,1,.3,1),box-shadow .32s}
.bc:hover{transform:translateY(-3px) scale(1.005);box-shadow:0 16px 48px rgba(26,10,0,.11)}
.bm{border-radius:22px;padding:26px;display:flex;flex-direction:column;justify-content:space-between;min-height:0;height:100%;position:relative;overflow:hidden;transition:transform .32s cubic-bezier(.16,1,.3,1),box-shadow .32s}
.bm:hover{transform:translateY(-3px) scale(1.005);box-shadow:0 16px 48px rgba(26,10,0,.11)}

/* stores */
.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px}
@media(max-width:640px){.sg{grid-template-columns:1fr}}

/* products */
.pg{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:12px}
@media(max-width:640px){.pg{grid-template-columns:repeat(2,1fr)}}
.pc{background:var(--card);border-radius:17px;border:1px solid var(--b);overflow:hidden;cursor:pointer;transition:transform .28s,box-shadow .28s}
.pc:hover{transform:translateY(-5px);box-shadow:0 12px 36px rgba(26,10,0,.08)}

/* category tabs */
.ct{background:none;border:1.5px solid var(--b);cursor:pointer;padding:8px 17px;border-radius:50px;font-size:.8rem;font-weight:600;font-family:'Gilroy',sans-serif;color:var(--coal,#1A0A00);transition:all .2s;white-space:nowrap}
body.dk .ct{color:#F5EFE6;border-color:rgba(245,239,230,.1)}
.ct:hover,.ct.on{background:#C8251A;color:#fff;border-color:#C8251A}

/* process 3x2 */
.pf3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
@media(max-width:900px){.pf3{grid-template-columns:repeat(2,1fr)}}
@media(max-width:540px){.pf3{grid-template-columns:1fr}}
.pf-row{display:flex;align-items:center;gap:0;margin-bottom:44px;overflow-x:auto;padding-bottom:4px}
.pf-node{width:32px;height:32px;border-radius:50%;border:2px solid #C8251A;display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:800;color:#C8251A;flex-shrink:0;font-family:'Gilroy',sans-serif;background:var(--cr)}
body.dk .pf-node{background:var(--dk)}
.pf-line{flex:1;height:2px;background:linear-gradient(90deg,#C8251A,#E8391A);min-width:14px}

/* history cards */
.hc-grid{display:flex;flex-direction:column;gap:12px;max-width:800px}
.hc{background:var(--card);border-radius:17px;border:1px solid var(--b);overflow:hidden;display:flex;align-items:stretch;transition:transform .28s,box-shadow .28s}
.hc:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(26,10,0,.07)}
body.dk .hc{background:#111}
.hc-year{font-family:'Gilroy',sans-serif;font-weight:900;font-size:1.4rem;color:#C8251A;line-height:1;flex-shrink:0;width:64px;margin-bottom:8px}

/* gallery */
.gal-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
@media(max-width:900px){.gal-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:540px){.gal-grid{grid-template-columns:1fr 1fr;gap:8px}}
.gal-card{position:relative;border-radius:18px;overflow:hidden;aspect-ratio:4/3;transition:transform .35s cubic-bezier(.16,1,.3,1),box-shadow .35s}
.gal-card:hover{transform:translateY(-4px) scale(1.01);box-shadow:0 16px 48px rgba(0,0,0,.18)}
.gal-img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .6s cubic-bezier(.16,1,.3,1)}
.gal-card:hover .gal-img{transform:scale(1.06)}
.gal-placeholder{width:100%;height:100%;background:var(--b2);display:flex;align-items:center;justify-content:center}
.gal-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.65) 0%,rgba(0,0,0,.1) 50%,transparent 100%);display:flex;align-items:flex-end;padding:16px 18px;transition:background .3s}
.gal-card:hover .gal-overlay{background:linear-gradient(to top,rgba(0,0,0,.78) 0%,rgba(0,0,0,.2) 60%,transparent 100%)}
.gal-year{font-family:'Gilroy',sans-serif;font-weight:900;font-size:1.8rem;color:#F5EFE6;letter-spacing:-.03em;line-height:1;text-shadow:0 2px 12px rgba(0,0,0,.3)}
.gal-caption{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.82);backdrop-filter:blur(12px);padding:0 18px;max-height:0;overflow:hidden;transition:max-height .4s cubic-bezier(.16,1,.3,1),padding .4s}
.gal-caption.open{max-height:120px;padding:14px 18px}

/* b2b adv 2x2 */
.adv4{display:grid;grid-template-columns:1fr 1fr;gap:13px}
@media(max-width:640px){.adv4{grid-template-columns:1fr}}

/* marquee */
.mqw{overflow:hidden;width:100%}
.mqf{animation:mq 34s linear infinite;display:flex;gap:0;white-space:nowrap;align-items:center}
.mqb{animation:mqr 40s linear infinite;display:flex;gap:0;white-space:nowrap;align-items:center}



/* lightbox */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.88);backdrop-filter:blur(16px);z-index:1200;display:flex;align-items:center;justify-content:center;padding:24px;animation:fadeUp .25s}
.lightbox-content{position:relative;max-width:520px;width:100%;display:flex;flex-direction:column;align-items:center}
.lightbox-close{position:fixed;top:20px;right:20px;background:rgba(255,255,255,.1);border:none;cursor:pointer;width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:background .2s;z-index:1201}
.lightbox-close:hover{background:rgba(255,255,255,.2)}
.lightbox-nav{background:rgba(255,255,255,.1);border:none;cursor:pointer;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:background .2s;transform:rotate(180deg)}
.lightbox-nav:hover{background:rgba(255,255,255,.2)}
.cert-card{border-radius:16px;border:1px solid var(--b);overflow:hidden;flex-shrink:0;width:180px;cursor:pointer;transition:transform .3s cubic-bezier(.16,1,.3,1),box-shadow .3s;scroll-snap-align:start}
.cert-card:hover{transform:translateY(-4px);box-shadow:0 12px 36px rgba(26,10,0,.1)}
.cert-card:hover img{transform:scale(1.05)}
@media(max-width:640px){.cert-dots{display:flex!important}.cert-arrow{display:none!important}}
.cert-arrow{position:absolute;top:50%;transform:translateY(-50%);z-index:5;background:var(--card);border:1px solid var(--b);border-radius:50%;width:38px;height:38px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;box-shadow:0 4px 12px rgba(0,0,0,.08)}
.cert-arrow:hover{background:#C8251A;border-color:#C8251A}
.cert-arrow:hover svg{stroke:#fff!important}
.cert-arrow-l{left:-16px;transform:translateY(-50%) rotate(180deg)}
.cert-arrow-r{right:-16px}
@media(max-width:640px){.cert-arrow{display:none}}
.cert-dots{display:none;justify-content:center;gap:6px;margin-top:14px}
@media(max-width:640px){.cert-dots{display:flex}}
.cert-dot{width:8px;height:8px;border-radius:50%;background:var(--b2);transition:background .2s}
.cert-dot.on{background:#C8251A}
.hide-scrollbar{-ms-overflow-style:none;scrollbar-width:none}
.hide-scrollbar::-webkit-scrollbar{display:none}

/* cart */
.cart-badge{position:absolute;top:-4px;right:-6px;background:#C8251A;color:#fff;font-size:.55rem;font-weight:900;width:17px;height:17px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Gilroy',sans-serif;line-height:1;pointer-events:none}
.cart-panel{position:fixed;top:0;right:-420px;width:400px;max-width:92vw;height:100vh;background:var(--cr);z-index:1100;transition:right .35s cubic-bezier(.16,1,.3,1);box-shadow:-8px 0 40px rgba(0,0,0,.12);display:flex;flex-direction:column}
body.dk .cart-panel{background:#0A0A0A}
.cart-panel.open{right:0}
.cart-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1099;opacity:0;pointer-events:none;transition:opacity .3s}
.cart-overlay.open{opacity:1;pointer-events:auto}
.cart-item{display:flex;gap:12px;padding:14px 0;border-bottom:1px solid var(--b);align-items:center}
.cart-item img{width:60px;height:60px;border-radius:10px;object-fit:cover;background:var(--b2)}
.cart-qty{display:flex;align-items:center;gap:0;border:1px solid var(--b);border-radius:20px;overflow:hidden}
.cart-qty button{background:none;border:none;cursor:pointer;width:30px;height:30px;display:flex;align-items:center;justify-content:center;transition:background .15s}
.cart-qty button:hover{background:rgba(200,37,26,.1)}
.cart-qty span{font-size:.82rem;font-weight:700;min-width:28px;text-align:center}
.add-cart-btn{background:#C8251A;color:#fff;border:none;cursor:pointer;padding:7px 14px;border-radius:50px;font-size:.72rem;font-weight:700;font-family:'Gilroy',sans-serif;display:flex;align-items:center;gap:5px;transition:all .2s;white-space:nowrap}
.add-cart-btn:hover{background:#A81E14;transform:scale(1.03)}
.add-cart-btn.in{background:transparent;border:1.5px solid #C8251A;color:#C8251A;padding:6px 13px}
.checkout-form{display:flex;flex-direction:column;gap:14px}
.checkout-form label{font-size:.78rem;font-weight:600;display:flex;flex-direction:column;gap:5px}
.checkout-form input,.checkout-form textarea,.checkout-form select{padding:11px 14px;border-radius:12px;border:1px solid var(--b);font-family:'Gilroy',sans-serif;font-size:.88rem;background:var(--card);color:inherit;outline:none;transition:border-color .2s}
.checkout-form input:focus,.checkout-form textarea:focus{border-color:#C8251A}
body.dk .checkout-form input,body.dk .checkout-form textarea,body.dk .checkout-form select{background:#111;border-color:rgba(245,239,230,.1)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--coal,#1A0A00);color:#F5EFE6;padding:12px 24px;border-radius:50px;font-size:.82rem;font-weight:600;z-index:1200;transition:transform .4s cubic-bezier(.16,1,.3,1);pointer-events:none;white-space:nowrap;font-family:'Gilroy',sans-serif}
body.dk .toast{background:#fff;color:#050505}
.toast.show{transform:translateX(-50%) translateY(0)}

/* contacts mobile */
@media(max-width:640px){.contacts-grid{grid-template-columns:1fr!important}}

/* news mobile */
@media(max-width:640px){.news-grid{grid-template-columns:1fr!important}}

/* footer */
.ft{background:#100600;padding:72px 0 30px}
body.dk .ft{background:#020202}
.ftg{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr;gap:40px;margin-bottom:52px}
@media(max-width:1024px){.ftg{grid-template-columns:1fr 1fr 1fr;gap:26px}}
@media(max-width:560px){.ftg{grid-template-columns:1fr 1fr;gap:18px}}
.ftl{display:block;color:rgba(245,239,230,.36);font-size:.8rem;margin-bottom:10px;cursor:pointer;transition:color .2s}
.ftl:hover{color:#E8391A}

/* tags */
.tg{display:inline-flex;align-items:center;background:rgba(200,37,26,.1);color:#C8251A;font-size:.62rem;font-weight:800;padding:4px 10px;border-radius:14px;font-family:'Gilroy',sans-serif;letter-spacing:.06em;text-transform:uppercase}
.tglt{background:rgba(245,239,230,.14);color:rgba(245,239,230,.65)}
.tggr{background:rgba(34,197,94,.1);color:#16a34a}

/* form */
input,textarea,select{width:100%;padding:11px 14px;border-radius:11px;border:1.5px solid var(--b);background:rgba(26,10,0,.025);color:var(--coal,#1A0A00);font-family:'Gilroy',sans-serif;font-size:.86rem;outline:none;transition:border .2s}
body.dk input,body.dk textarea,body.dk select{background:rgba(255,255,255,.06);color:#F5EFE6;border-color:rgba(245,239,230,.1)}
input:focus,textarea:focus{border-color:#E8391A}
.fl{display:block;font-size:.68rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--t3);margin-bottom:5px}

/* vacancy */
.vc{background:var(--card);border-radius:17px;border:1px solid var(--b);padding:22px 24px;transition:transform .25s,box-shadow .25s}
.vc:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(26,10,0,.07)}

/* page transition */
.page-wrap{animation:fadeUp .35s cubic-bezier(.16,1,.3,1) both}

/* grain */
.grain-ov::after{content:'';position:absolute;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.04'/%3E%3C/svg%3E");pointer-events:none;z-index:0}

.pulse{animation:pulse 2.2s ease infinite}

/* info boxes on sub-pages */
.info-box{background:var(--card);border-radius:18px;border:1px solid var(--b);padding:28px 24px}
.info-row{display:grid;grid-template-columns:1fr 1fr;gap:13px}

/* ═══════ REVEAL HOOK ═══════ */
function useRv(){
  const ref=useRef(null);
  const[v,setV]=useState(false);
  useEffect(()=>{
    if(!ref.current)return;
    const o=new IntersectionObserver(([e])=>{if(e.isIntersecting){setV(true);o.disconnect();}},{threshold:.06});
    o.observe(ref.current);
    return()=>o.disconnect();
  },[]);
  return[ref,v];
}
function Rv({children,d=0,style={}}){
  const[ref,v]=useRv();
  return <div ref={ref} className={`rv${v?' vis':''}`} style={{transitionDelay:`${d}s`,...style}}>{children}</div>;
}

/* ═══════ CAREERS (shared + full) ═══════ */
function Careers({preview,setPage,lang,dark}){
  const t=LANGS[lang];
  const tc=t.careers;
  const co=dark?"#F5EFE6":"#1A0A00";
  const bg=dark?"#0A0A0A":"#FBF7F2";
  const cBg=dark?"#111":"#fff";
  const[applyJob,setApplyJob]=useState(null);
  const[step,setStep]=useState(1);
  const[appForm,setAppForm]=useState({name:"",phone:"",exp:"",msg:""});
  const[appSent,setAppSent]=useState(false);
  const icons=["award","shield","leaf","zap","phone","factory"];
  const colors=["#C8251A","#C8251A","#E8391A","#E8391A","#C8251A","#E8391A"];

  return(
    <section id="careers" style={{background:bg}} className="sec">
      <div className="w">
        <Rv><SH label={tc.label} title={tc.title} em=""/></Rv>

        {/* Stats */}
        <div className="stat4" style={{marginBottom:52}}>
          {tc.stats.map((s,i)=>(
            <Rv key={i} d={i*.07}>
              <div style={{background:i===0?"#C8251A":i===1?"#1A0A00":cBg,borderRadius:16,border:i>1?"1px solid var(--b)":"none",padding:"22px 18px"}}>
                <div className="num" style={{fontSize:"clamp(1.7rem,2.6vw,2.3rem)",color:i<2?"#F5EFE6":co,lineHeight:1,marginBottom:9}}>{s.n}</div>
                <div style={{fontSize:".71rem",fontWeight:700,color:i<2?"rgba(245,239,230,.5)":"var(--t3)",textTransform:"uppercase",letterSpacing:".05em",lineHeight:1.4}}>{s.l}</div>
              </div>
            </Rv>
          ))}
        </div>

        {/* Perks — full width, no quote */}
        <Rv d={.05}>
          <div style={{marginBottom:60}}>
            <div style={{fontFamily:"'Gilroy',sans-serif",fontWeight:700,color:co,fontSize:"1.25rem",marginBottom:24}}>Почему выбирают Аксай</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))",gap:13}}>
              {tc.perks.map((p,i)=>(
                <div key={i} style={{background:cBg,borderRadius:16,border:"1px solid var(--b)",padding:"24px 20px",display:"flex",gap:16,alignItems:"flex-start"}}>
                  <div style={{width:40,height:40,borderRadius:10,background:i%2===0?"rgba(200,37,26,.09)":"rgba(232,57,26,.09)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                    <Ico n={icons[i%icons.length]} s={16} c={colors[i%colors.length]}/>
                  </div>
                  <div>
                    <div style={{fontWeight:700,fontSize:".88rem",color:co,marginBottom:6}}>{p.t}</div>
                    <div style={{color:"var(--t2)",fontSize:".79rem",lineHeight:1.55}}>{p.d}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </Rv>

        {/* Vacancies — more presentable */}
        <Rv d={.1}><span className="shl">{tc.vlabel}</span></Rv>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(340px,1fr))",gap:14,marginTop:16}}>
          {(preview?JOBS.slice(0,4):JOBS).map((j,i)=>(
            <Rv key={j.id} d={i*.06}>
              <div style={{background:cBg,borderRadius:18,border:"1px solid var(--b)",padding:"24px 22px",display:"flex",flexDirection:"column",gap:0,transition:"transform .28s,box-shadow .28s"}}
                onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-3px)";e.currentTarget.style.boxShadow="0 8px 28px rgba(26,10,0,.08)";}}
                onMouseLeave={e=>{e.currentTarget.style.transform="none";e.currentTarget.style.boxShadow="none";}}>
                <div style={{display:"flex",alignItems:"flex-start",gap:14,marginBottom:14}}>
                  <div style={{width:50,height:50,borderRadius:14,background:i%2===0?"rgba(200,37,26,.09)":"rgba(232,57,26,.09)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:"1.5rem"}}><Ico n={j.icon} s={22} c={i%2===0?"#C8251A":"#E8391A"}/></div>
                  <div style={{flex:1}}>
                    <div style={{display:"flex",alignItems:"center",gap:7,flexWrap:"wrap",marginBottom:5}}>
                      <span style={{fontWeight:700,fontSize:".9rem",color:co}}>{j.t[lang]||j.t.RU}</span>
                      {j.isNew&&<span className="tg" style={{fontSize:".59rem",padding:"3px 8px"}}>Новая</span>}
                    </div>
                    <span style={{fontSize:".74rem",color:"var(--t3)"}}>{j.dept[lang]||j.dept.RU}</span>
                  </div>
                  <button style={{width:36,height:36,borderRadius:"50%",background:"#C8251A",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"background .2s"}} onClick={(e)=>{e.stopPropagation();setApplyJob(j);setStep(1);setAppForm({name:"",phone:"",exp:"",msg:""});setAppSent(false);}} onMouseEnter={e=>{e.currentTarget.style.background="#E8391A";}} onMouseLeave={e=>{e.currentTarget.style.background="#C8251A";}}><Ico n="arr" s={14} c="#fff"/></button>
                </div>
                <p style={{fontSize:".8rem",color:"var(--t2)",lineHeight:1.58,marginBottom:16,flex:1}}>{j.desc[lang]||j.desc.RU}</p>
                <div style={{paddingTop:14,borderTop:"1px solid var(--b)"}}>
                  <span style={{fontWeight:800,fontSize:".92rem",color:"#C8251A"}}>{j.sal}</span>
                </div>
              </div>
            </Rv>
          ))}
        </div>

        {preview&&<Rv d={.2}><div style={{textAlign:"center",marginTop:36}}>
          <button className="btn br" onClick={()=>{setPage("careers");window.scrollTo({top:0});}}>{tc.more} <Ico n="arr" s={13} c="#fff"/></button>
        </div></Rv>}

        {/* Apply Modal */}
        {applyJob&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.7)",backdropFilter:"blur(8px)",zIndex:1200,display:"flex",alignItems:"center",justifyContent:"center",padding:20}} onClick={()=>setApplyJob(null)}>
          <div style={{background:cBg,borderRadius:22,maxWidth:480,width:"100%",padding:"36px 32px",position:"relative",maxHeight:"85vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>
            <button onClick={()=>setApplyJob(null)} style={{position:"absolute",top:16,right:16,background:"none",border:"none",cursor:"pointer"}}><Ico n="x" s={20} c={co}/></button>

            {appSent?(
              <div style={{textAlign:"center",padding:"24px 0"}}>
                <div style={{width:56,height:56,borderRadius:"50%",background:"rgba(34,197,94,.1)",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 18px"}}><Ico n="check" s={26} c="#16a34a"/></div>
                <div style={{fontWeight:700,color:co,fontSize:"1.15rem",marginBottom:8}}>{lang==="KK"?"Өтінім жіберілді!":"Заявка отправлена!"}</div>
                <p style={{color:"var(--t2)",fontSize:".85rem",marginBottom:20}}>{lang==="KK"?"HR бөлімі сізбен 2 жұмыс күн ішінде байланысады":"HR свяжется с вами в течение 2 рабочих дней"}</p>
                <button className="btn br" onClick={()=>setApplyJob(null)}>{lang==="KK"?"Жабу":"Закрыть"}</button>
              </div>
            ):(
              <>
                <div style={{fontWeight:700,fontSize:"1.1rem",color:co,marginBottom:4}}>{applyJob.t[lang]||applyJob.t.RU}</div>
                <div style={{fontSize:".78rem",color:"var(--t3)",marginBottom:24}}>{applyJob.dept[lang]||applyJob.dept.RU} · {applyJob.sal}</div>

                {/* Step indicator */}
                <div style={{display:"flex",gap:8,marginBottom:28}}>
                  {[1,2,3].map(s=>(
                    <div key={s} style={{flex:1,height:3,borderRadius:2,background:s<=step?"#C8251A":"var(--b)",transition:"background .3s"}}/>
                  ))}
                </div>

                {step===1&&(
                  <div>
                    <div style={{fontSize:".88rem",fontWeight:600,color:co,marginBottom:18}}>{lang==="KK"?"Контактілер":"Контактные данные"}</div>
                    <div style={{marginBottom:14}}>
                      <label className="fl">{lang==="KK"?"Аты-жөні":"ФИО"}</label>
                      <input value={appForm.name} onChange={e=>setAppForm(f=>({...f,name:e.target.value}))} placeholder={lang==="KK"?"Толық аты-жөніңіз":"Ваше полное имя"}/>
                    </div>
                    <div style={{marginBottom:14}}>
                      <label className="fl">{lang==="KK"?"Телефон":"Телефон"}</label>
                      <input type="tel" value={appForm.phone} onChange={e=>setAppForm(f=>({...f,phone:e.target.value}))} placeholder="+7 7XX XXX XX XX"/>
                    </div>
                    <button className="btn br" style={{width:"100%",justifyContent:"center",marginTop:8}} onClick={()=>{if(appForm.name&&appForm.phone)setStep(2);}}>{lang==="KK"?"Келесі":"Далее"} <Ico n="arr" s={13} c="#fff"/></button>
                  </div>
                )}

                {step===2&&(
                  <div>
                    <div style={{fontSize:".88rem",fontWeight:600,color:co,marginBottom:18}}>{lang==="KK"?"Тәжірибе":"Опыт работы"}</div>
                    <div style={{marginBottom:14}}>
                      <label className="fl">{lang==="KK"?"Тәжірибе":"Стаж в отрасли"}</label>
                      <select value={appForm.exp} onChange={e=>setAppForm(f=>({...f,exp:e.target.value}))}>
                        <option value="">{lang==="KK"?"Таңдаңыз":"Выберите"}</option>
                        <option value="no">{lang==="KK"?"Тәжірибесіз":"Без опыта"}</option>
                        <option value="1-3">{lang==="KK"?"1-3 жыл":"1-3 года"}</option>
                        <option value="3-5">{lang==="KK"?"3-5 жыл":"3-5 лет"}</option>
                        <option value="5+">{lang==="KK"?"5+ жыл":"5+ лет"}</option>
                      </select>
                    </div>
                    <div style={{display:"flex",gap:10,marginTop:18}}>
                      <button className="btn bg" style={{flex:1,justifyContent:"center"}} onClick={()=>setStep(1)}>{lang==="KK"?"Артқа":"Назад"}</button>
                      <button className="btn br" style={{flex:2,justifyContent:"center"}} onClick={()=>{if(appForm.exp)setStep(3);}}>{lang==="KK"?"Келесі":"Далее"} <Ico n="arr" s={13} c="#fff"/></button>
                    </div>
                  </div>
                )}

                {step===3&&(
                  <div>
                    <div style={{fontSize:".88rem",fontWeight:600,color:co,marginBottom:18}}>{lang==="KK"?"Хат":"Сопроводительное письмо"}</div>
                    <div style={{marginBottom:14}}>
                      <label className="fl">{lang==="KK"?"Хабарлама (міндетті емес)":"Сообщение (необязательно)"}</label>
                      <textarea rows={4} value={appForm.msg} onChange={e=>setAppForm(f=>({...f,msg:e.target.value}))} style={{resize:"vertical"}} placeholder={lang==="KK"?"Неліктен бізде жұмыс істегіңіз келеді?":"Почему хотите работать у нас?"}/>
                    </div>
                    <div style={{display:"flex",gap:10,marginTop:18}}>
                      <button className="btn bg" style={{flex:1,justifyContent:"center"}} onClick={()=>setStep(2)}>{lang==="KK"?"Артқа":"Назад"}</button>
                      <button className="btn br" style={{flex:2,justifyContent:"center"}} onClick={()=>setAppSent(true)}>{lang==="KK"?"Жіберу":"Отправить"} <Ico n="check" s={13} c="#fff"/></button>
                    </div>
                  </div>
                )}
              </>
            )}
          </div>
        </div>}
      </div>
    </section>
  );
}

/* ═══════ FULL CAREERS PAGE ═══════ */

                <div style={{background:cBg,borderRadius:17,border:"1px solid var(--b)",padding:"24px 20px",height:"100%"}}>

                  </div>
                  <div style={{fontWeight:700,fontSize:".9rem",color:co,marginBottom:8}}>{b.t}</div>

          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(340px,1fr))",gap:14,marginTop:18}}>
            {JOBS.map((j,i)=>(
              <Rv key={j.id} d={i*.05}>
                <div style={{background:cBg,borderRadius:18,border:"1px solid var(--b)",padding:"24px 22px",position:"relative",display:"flex",flexDirection:"column",height:"100%",transition:"transform .25s,box-shadow .25s"}} onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-3px)";e.currentTarget.style.boxShadow="0 8px 28px rgba(26,10,0,.08)";}} onMouseLeave={e=>{e.currentTarget.style.transform="none";e.currentTarget.style.boxShadow="none";}}>
                  <button style={{position:"absolute",top:18,right:18,width:34,height:34,borderRadius:"50%",background:"#C8251A",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",transition:"background .2s",zIndex:2}} onClick={(e)=>{e.stopPropagation();setApplyJob(j);setStep(1);setAppForm({name:"",phone:"",exp:"",msg:""});setAppSent(false);}} onMouseEnter={e=>{e.currentTarget.style.background="#E8391A";}} onMouseLeave={e=>{e.currentTarget.style.background="#C8251A";}}><Ico n="aur" s={14} c="#fff"/></button>

                {/* Step indicator */}
                <div style={{display:"flex",gap:8,marginBottom:28}}>

                      <label className="fl">{lang==="KK"?"Аты-жөні":"ФИО"}</label>

                      <input type="tel" value={appForm.phone} onChange={e=>setAppForm(f=>({...f,phone:e.target.value}))} placeholder="+7 7XX XXX XX XX"/>

                    <button className="btn br" style={{width:"100%",justifyContent:"center",marginTop:8}} onClick={()=>{if(appForm.name&&appForm.phone)setStep(2);}}>{lang==="KK"?"Келесі":"Далее"} <Ico n="arr" s={13} c="#fff"/></button>

                      </select>
                    </div>
                    <div style={{display:"flex",gap:10,marginTop:18}}>
                      <button className="btn bg" style={{flex:1,justifyContent:"center"}} onClick={()=>setStep(1)}>{lang==="KK"?"Артқа":"Назад"}</button>
                      <button className="btn br" style={{flex:2,justifyContent:"center"}} onClick={()=>{if(appForm.exp)setStep(3);}}>{lang==="KK"?"Келесі":"Далее"} <Ico n="arr" s={13} c="#fff"/></button>

                    <div style={{marginBottom:14}}>
                      <label className="fl">{lang==="KK"?"Хабарлама (міндетті емес)":"Сообщение (необязательно)"}</label>
                      <textarea rows={4} value={appForm.msg} onChange={e=>setAppForm(f=>({...f,msg:e.target.value}))} style={{resize:"vertical"}} placeholder={lang==="KK"?"Неліктен бізде жұмыс істегіңіз келеді?":"Почему хотите работать у нас?"}/>
                    </div>
                    <div style={{display:"flex",gap:10,marginTop:18}}>
                      <button className="btn bg" style={{flex:1,justifyContent:"center"}} onClick={()=>setStep(2)}>{lang==="KK"?"Артқа":"Назад"}</button>
                      <button className="btn br" style={{flex:2,justifyContent:"center"}} onClick={()=>setAppSent(true)}>{lang==="KK"?"Жіберу":"Отправить"} <Ico n="check" s={13} c="#fff"/></button>
                    </div>
                  </div>
                )}
              </>
            )}
          </div>
        </div>}
    </div>
  );
}


/* ═══════ REVIEWS SECTION ═══════ */
function Reviews({lang,dark}){

/* ═══════ CERTIFICATES SLIDER ═══════ */
function CertSlider({lang,dark}){
  const co=dark?"#F5EFE6":"#1A0A00";
  const cBg=dark?"#111":"#fff";
  const bg=dark?"#0A0A0A":"#FBF7F2";
  const[sel,setSel]=useState(null);
  const scrollRef=useRef(null);
  const scroll=(dir)=>{if(scrollRef.current)scrollRef.current.scrollBy({left:dir*300,behavior:"smooth"});};
  const certLabel=lang==="ZH"?"质量":lang==="KK"?"Сапа":lang==="EN"?"Quality":"Качество";
  const certTitle=lang==="ZH"?"产品证书":lang==="KK"?"Өнім сертификаттары":lang==="EN"?"Certificates":"Сертификаты";
  const certEm=lang==="ZH"?" 产品":lang==="KK"?" өнімдер":lang==="EN"?" of products":" продукции";
  const certSub=lang==="ZH"?"我们的产品已通过认证，符合所有质量标准。":lang==="KK"?"Біздің өнім сертификатталған және барлық сапа стандарттарына сай.":lang==="EN"?"Our products are certified and meet all quality standards.":"Наша продукция прошла сертификацию и соответствует всем стандартам качества.";
  return(
    <section id="certificates" style={{background:bg}} className="sec">
      <div className="w">
        <Rv><SH label={certLabel} title={certTitle} em={certEm} sub={certSub}/></Rv>
        <div style={{position:"relative"}}>
          <button onClick={()=>scroll(-1)} className="cert-arrow cert-arrow-l"><Ico n="arr" s={16} c={co} style={{transform:"rotate(180deg)"}}/></button>
          <div ref={scrollRef} style={{display:"flex",gap:14,overflowX:"auto",paddingBottom:12,scrollSnapType:"x mandatory",scrollBehavior:"smooth"}} className="hide-scrollbar">
            {CERT_NAMES.map((name,i)=>(
              <Rv key={i} d={i*.04}>
                <div className="cert-card" onClick={()=>setSel(i)} style={{background:cBg,height:"100%",display:"flex",flexDirection:"column"}}>
                  <div style={{height:220,overflow:"hidden",position:"relative"}}>
                    <img src={CERT_IMG["cert_"+i]} alt={name} style={{width:"100%",height:"100%",objectFit:"cover",display:"block",transition:"transform .4s"}}/>
                    <div style={{position:"absolute",inset:0,background:"linear-gradient(to top,rgba(0,0,0,.3) 0%,transparent 50%)",display:"flex",alignItems:"flex-end",padding:"12px 14px"}}>
                      <div style={{display:"flex",alignItems:"center",gap:5}}><Ico n="shield" s={12} c="rgba(245,239,230,.8)"/><span style={{fontSize:".6rem",fontWeight:700,color:"rgba(245,239,230,.8)",textTransform:"uppercase",letterSpacing:".05em"}}>ISO / HACCP</span></div>
                    </div>
                  </div>
                  <div style={{padding:"12px 14px"}}>
                    <div style={{fontSize:".74rem",fontWeight:600,color:co,lineHeight:1.4}}>{name}</div>
                  </div>
                </div>
              </Rv>
            ))}
          </div>
          <button onClick={()=>scroll(1)} className="cert-arrow cert-arrow-r"><Ico n="arr" s={16} c={co}/></button>
          {/* Mobile dots */}

/* ═══════ TOAST ═══════ */
function Toast({msg}){
  const[show,setShow]=useState(false);
  useEffect(()=>{if(msg){setShow(true);const t=setTimeout(()=>setShow(false),2200);return()=>clearTimeout(t);}},[msg]);
  return <div className={`toast${show?" show":""}`}>{msg}</div>;
}

                  <div style={{fontWeight:800,fontSize:".85rem",color:"#C8251A"}}>{(item.p*item.qty).toLocaleString()} ₸</div>
                </div>
                <div className="cart-qty">
                  <button onClick={()=>updQty(item.id,-1)}><Ico n="minus" s={13} c={co}/></button>
                  <span style={{color:co}}>{item.qty}</span>
                  <button onClick={()=>updQty(item.id,1)}><Ico n="plus" s={13} c={co}/></button>
                </div>
                <button onClick={()=>remove(item.id)} style={{background:"none",border:"none",cursor:"pointer",padding:4}}><Ico n="trash" s={15} c="var(--t3)"/></button>
              </div>
            );
          })}
        </div>
        {cart.length>0&&<div style={{padding:"16px 20px",borderTop:"1px solid var(--b)"}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:14}}>
            <span style={{fontWeight:600,color:co}}>{t.total}:</span>
            <span style={{fontWeight:900,fontSize:"1.1rem",color:"#C8251A"}}>{total.toLocaleString()} ₸</span>
          </div>
          <button className="btn br" style={{width:"100%",justifyContent:"center"}} onClick={onCheckout}>{t.checkout} <Ico n="arr" s={13} c="#fff"/></button>
          <button className="btn bg" style={{width:"100%",justifyContent:"center",marginTop:8}} onClick={()=>setCart([])}>{t.clear}</button>
        </div>}
      </div>
    </>
  );
}

/* ═══════ CHECKOUT FORM ═══════ */
function CheckoutPage({cart,setCart,lang,dark,setPage}){
  const t=(LANGS[lang]||LANGS.RU).cart||{};
  const co=dark?"#F5EFE6":"#1A0A00";
  const bg=dark?"#050505":"#F5EFE6";
  const total=cart.reduce((s,c)=>s+c.p*c.qty,0);
  const[delivery,setDelivery]=useState("pickup");
  const[store,setStore]=useState(STORES[0]?.id||1);
  const[sent,setSent]=useState(false);

  if(sent)return(
    <section style={{background:bg,minHeight:"60vh",display:"flex",alignItems:"center",justifyContent:"center"}} className="sec">
      <div style={{textAlign:"center",maxWidth:500}}>
        <div style={{width:72,height:72,borderRadius:"50%",background:"rgba(200,37,26,.1)",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 20px"}}><Ico n="check" s={36} c="#C8251A"/></div>
        <div style={{fontFamily:"'Gilroy',sans-serif",fontWeight:800,fontSize:"1.4rem",color:co,marginBottom:12}}>{t.success}</div>
        <button className="btn br" onClick={()=>{setCart([]);setPage("home");}}>{t.back} <Ico n="arr" s={13} c="#fff"/></button>
      </div>
    </section>
  );

  return(
    <section style={{background:bg}} className="sec">
      <div className="w" style={{maxWidth:720}}>
        <Rv>
          <div className="sh">
            <span className="shl">{t.orderTitle}</span>
            <h2 className="sht">{t.checkout}</h2>
          </div>
        </Rv>
        <div style={{display:"grid",gridTemplateColumns:"1fr",gap:32}}>
          <div style={{background:"var(--card)",borderRadius:18,border:"1px solid var(--b)",padding:"20px 22px"}}>
            <div style={{fontWeight:700,fontSize:".92rem",color:co,marginBottom:14}}>{t.title} ({cart.length} {t.items})</div>
            {cart.map(item=>{
              const nm=item.n[lang]||item.n.RU;
              return(
                <div key={item.id} style={{display:"flex",gap:10,alignItems:"center",padding:"8px 0",borderBottom:"1px solid var(--b)"}}>
                  {PROD_PHOTOS["p"+item.id]?<img src={PROD_PHOTOS["p"+item.id]} alt={nm} style={{width:44,height:44,borderRadius:8,objectFit:"cover"}}/>:<div style={{width:44,height:44,borderRadius:8,background:"var(--b2)"}}/>}
                  <div style={{flex:1}}>
                    <div style={{fontSize:".8rem",fontWeight:600,color:co}}>{nm}</div>
                    <div style={{fontSize:".72rem",color:"var(--t3)"}}>{item.qty} × {item.p.toLocaleString()} ₸</div>
                  </div>
                  <div style={{fontWeight:700,fontSize:".85rem",color:co}}>{(item.p*item.qty).toLocaleString()} ₸</div>
                </div>
              );
            })}
            <div style={{display:"flex",justifyContent:"space-between",padding:"14px 0 0",fontWeight:800,fontSize:"1.05rem"}}>
              <span style={{color:co}}>{t.total}:</span>
              <span style={{color:"#C8251A"}}>{total.toLocaleString()} ₸</span>
            </div>
          </div>

          <form className="checkout-form" onSubmit={(e)=>{e.preventDefault();setSent(true);}}>
            <label>{t.name}<input required placeholder={t.name}/></label>
            <label>{t.phone}<input required type="tel" placeholder="+7 ___ ___ ____"/></label>
            <label>{t.delivery}
              <div style={{display:"flex",gap:8}}>
                <button type="button" className={`ct${delivery==="pickup"?" on":""}`} onClick={()=>setDelivery("pickup")}>{t.pickup}</button>
                <button type="button" className={`ct${delivery==="delivery"?" on":""}`} onClick={()=>setDelivery("delivery")}>{t.deliveryOpt}</button>
              </div>
            </label>
            {delivery==="delivery"&&<label>{t.address}<input required placeholder={t.address}/></label>}
            {delivery==="pickup"&&<label>{t.pickupStore}
              <select value={store} onChange={e=>setStore(+e.target.value)}>
                {STORES.map(s=><option key={s.id} value={s.id}>{s.n} — {s.a}</option>)}
              </select>
            </label>}
            <label>{t.comment}<textarea rows={3} placeholder={t.comment}/></label>
            <button type="submit" className="btn br" style={{width:"100%",justifyContent:"center",marginTop:8}}>{t.submit} <Ico n="arr" s={13} c="#fff"/></button>
          </form>
        </div>
      </div>
    </section>
  );
}

/* ═══════ MAIN APP ═══════ */
function App(){
  const[lang,setLang]=useState("KK");
  const[dark,setDark]=useState(false);
  const[page,setPage]=useState("home");
  const[cart,setCart]=useState([]);
  const[cartOpen,setCartOpen]=useState(false);
  const[toastMsg,setToastMsg]=useState("");
  const toastKey=useRef(0);

  const addToCart=(product)=>{
    setCart(prev=>{
      const ex=prev.find(c=>c.id===product.id);
      if(ex)return prev.map(c=>c.id===product.id?{...c,qty:c.qty+1}:c);
      return[...prev,{...product,qty:1}];
    });
    toastKey.current++;
    const tc=(LANGS[lang]||LANGS.RU).cart||{};
    setToastMsg(`${tc.added||"Added"}: ${product.n[lang]||product.n.RU}`);
  };

  useEffect(()=>{document.body.className=dark?"dk":"";},[dark]);
  useEffect(()=>{window.scrollTo(0,0);},[page]);

  const sharedProps={setPage,lang,dark};

  const landing=(
    <div className="page-wrap">
      <Hero {...sharedProps}/>
      <Stores preview={true} {...sharedProps}/>
      <Products preview={true} {...sharedProps} cart={cart} addToCart={addToCart}/>
      <Trust lang={lang} dark={dark}/>
      <History preview={true} {...sharedProps}/>
      <Production preview={true} {...sharedProps}/>
      <CertSlider lang={lang} dark={dark}/>
      <Reviews lang={lang} dark={dark}/>
      <Careers preview={true} {...sharedProps}/>
      <B2B preview={true} {...sharedProps}/>
      <NewsPreview setPage={setPage} lang={lang} dark={dark}/>
      <Contacts lang={lang} dark={dark}/>
    </div>
  );

  const subPage=(content)=>(
    <div className="page-wrap" style={{paddingTop:68}}>{content}</div>
  );

  const pages={
    home: landing,
    about: subPage(<AboutPage lang={lang} dark={dark}/>),
    prod: subPage(<ProductionPage lang={lang} dark={dark}/>),
    products: subPage(<Products preview={false} {...sharedProps} cart={cart} addToCart={addToCart}/>),
    stores: subPage(<StoresPage lang={lang} dark={dark}/>),
    partners: subPage(<PartnersPage lang={lang} dark={dark}/>),
    careers: subPage(<CareersPage lang={lang} dark={dark}/>),
    news: subPage(<NewsPage lang={lang} dark={dark}/>),
    media: subPage(<MediaPage lang={lang} dark={dark}/>),
    checkout: subPage(<CheckoutPage cart={cart} setCart={setCart} lang={lang} dark={dark} setPage={setPage}/>),
  };

  return(
    <>
      <NavBar page={page} setPage={setPage} lang={lang} setLang={setLang} dark={dark} setDark={setDark} cartCount={cart.reduce((s,c)=>s+c.qty,0)} onCartClick={()=>setCartOpen(true)}/>
      {pages[page]||pages.home}
      <Footer setPage={setPage} lang={lang} setLang={setLang} dark={dark} setDark={setDark}/>
      <CartPanel open={cartOpen} onClose={()=>setCartOpen(false)} cart={cart} setCart={setCart} lang={lang} dark={dark} onCheckout={()=>{setCartOpen(false);setPage("checkout");window.scrollTo({top:0});}}/>
      <Toast key={toastKey.current} msg={toastMsg}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
